<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page_title }} · Youtube Naslovnica</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="feed-body">
  <header class="feed-header">
    <div class="feed-header-inner">
      <div class="feed-header-start notranslate" translate="no">
        <a href="{{ url_for('index') }}" class="feed-logo">Youtube Naslovnica</a>
        <nav class="feed-nav">
          <a href="{{ url_for('index') }}" class="{% if active_feed %}active{% endif %}">Feed</a>
          <a href="{{ url_for('archive') }}" class="{% if active_archive %}active{% endif %}">Archive</a>
        </nav>
      </div>
      <details class="translate-disclosure notranslate" translate="no">
        <summary class="translate-summary">
          <span class="translate-summary-label">Translate page</span>
        </summary>
        <div class="translate-panel">
          <p class="translate-panel-hint">Uses Google Translate in your browser (third‑party).</p>
          <div id="google_translate_element"></div>
        </div>
      </details>
    </div>
  </header>
  <main class="feed-main">
    {% block content %}{% endblock %}
  </main>
  <script type="text/javascript">
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({
        pageLanguage: 'en',
        includedLanguages: 'hr,bs,sr,sl,sq,mk,de,it,fr,es,pl,uk,nl',
        layout: google.translate.TranslateElement.InlineLayout.DROPDOWN,
        autoDisplay: false,
      }, 'google_translate_element');
    }
  </script>
  <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
