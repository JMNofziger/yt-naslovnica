{% extends "base.html" %}
{% block content %}
{% if error %}
<p class="feed-error">{{ error }}</p>
{% elif not items %}
<p class="feed-empty">Nothing in the archive yet. Older than one week posts appear here.</p>
{% endif %}
<div class="card-list">
  {% for item in items %}
    {% include "_card.html" %}
  {% endfor %}
</div>
{% endblock %}
